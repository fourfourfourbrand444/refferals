<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - 444 Referral System</title>
<link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">
    <h1>Login</h1>
    <p class="subtitle">Access your referral dashboard</p>

    <div class="card">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <div class="divider">OR</div>

        <a href="index.html" class="login-btn">Create Account</a>

        <p id="message"></p>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5ZbS9myFyvj1SACJnCYFsvwT_g2XqTIs",
  authDomain: "referral-system-a1ee6.firebaseapp.com",
  projectId: "referral-system-a1ee6",
  storageBucket: "referral-system-a1ee6.firebasestorage.app",
  messagingSenderId: "234260994975",
  appId: "1:234260994975:web:d8866dc96ac07fb9f7fbaa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function () {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");

    signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
        window.location.href = "dashboard.html";
    })
    .catch((error) => {
        message.innerText = "Account not found. Please create an account first.";
        message.style.color = "red";
    });
};
</script>

</body>
</html>
