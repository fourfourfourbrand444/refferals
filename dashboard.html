<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Referral Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

<h1>Referral Dashboard</h1>

<div class="stats">

<div class="box">
<h3>Total Earnings</h3>
<p id="earnings">$0</p>
</div>

<div class="box">
<h3>Artists Referred</h3>
<p id="artists">0</p>
</div>
<div class="box">
<h3>Your Referral Code</h3>
<p id="code">---</p>
</div>

</div>

<button class="withdraw" onclick="withdraw()">Request Withdrawal</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore,doc,getDoc,addDoc,collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5ZbS9myFyvj1SACJnCYFsvwT_g2XqTIs",
  authDomain: "referral-system-a1ee6.firebaseapp.com",
  projectId: "referral-system-a1ee6",
  storageBucket: "referral-system-a1ee6.firebasestorage.app",
  messagingSenderId: "234260994975",
  appId: "1:234260994975:web:d8866dc96ac07fb9f7fbaa"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

onAuthStateChanged(auth, async(user)=>{

if(user){

const docRef = doc(db,"users",user.uid);
const docSnap = await getDoc(docRef);
const data = docSnap.data();

document.getElementById("earnings").innerText="$"+data.totalEarnings;
document.getElementById("artists").innerText=data.artistsReferred;
document.getElementById("code").innerText=data.referralCode;

}

});

window.withdraw = async function(){

const user = auth.currentUser;
await addDoc(collection(db,"withdrawals"),{
userId:user.uid,
status:"pending",
date:new Date()
});

alert("Withdrawal request submitted");

}

</script>

</body>
</html>
