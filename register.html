<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>444 Referral Panel</title>
<link rel="stylesheet" href="register.css">
</head>
<body>

<div class="container">

<h1>444 Referral System</h1>
<p class="subtitle">Earn by referring artists</p>

<div class="card">

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="text" id="referral" placeholder="Referral Code (Optional)">

<button onclick="signup()">Create Account</button>

<div class="divider">OR</div>

<button class="login-btn" onclick="window.location.href='login.html'">
Login Instead
</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5ZbS9myFyvj1SACJnCYFsvwT_g2XqTIs",
  authDomain: "referral-system-a1ee6.firebaseapp.com",
  projectId: "referral-system-a1ee6",
  storageBucket: "referral-system-a1ee6.firebasestorage.app",
  messagingSenderId: "234260994975",
  appId: "1:234260994975:web:d8866dc96ac07fb9f7fbaa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async function() {
  try {

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const referral = document.getElementById("referral").value;

    if (!name || !email || !password) {
      alert("Please fill all required fields");
      return;
    }

    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCred.user;

    await updateProfile(user, { displayName: name });

    await setDoc(doc(db, "users", user.uid), {
      name: name,
      email: email,
      referralCode: user.uid.slice(0, 6),
      referredBy: referral || null,
      totalEarnings: 0,
      artistsReferred: 0,
      balance: 0
    });

    alert("Account created successfully!");
    window.location.href = "dashboard.html";

  } catch (error) {
    alert(error.message);
  }
};

window.login = async function() {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "dashboard.html";
  } catch (error) {
    alert(error.message);
  }
};

</script>

</body>
</html>
